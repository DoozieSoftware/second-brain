<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); }

  /* Layout */
  .app { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: 60px 1fr; height: 100vh; }
  header { grid-column: 1 / -1; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  aside { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
  main { display: flex; flex-direction: column; overflow: hidden; }

  /* Status badges */
  .sources { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .source { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg); border-radius: 6px; font-size: 13px; }
  .source .dot { width: 8px; height: 8px; border-radius: 50%; }
  .source .dot.on { background: var(--green); }
  .source .dot.off { background: var(--border); }
  .source .count { margin-left: auto; color: var(--text-muted); font-size: 12px; }

  /* Actions */
  .actions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .btn { padding: 10px 16px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px; text-align: left; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn .label { font-weight: 500; }
  .btn .hint { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .btn.primary .hint { color: rgba(0,0,0,0.6); }

  /* Alerts */
  .alerts-header { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .alert { padding: 10px 12px; background: var(--bg); border-radius: 6px; margin-bottom: 6px; font-size: 13px; border-left: 3px solid var(--border); }
  .alert.high { border-left-color: var(--red); }
  .alert.medium { border-left-color: var(--yellow); }
  .alert.low { border-left-color: var(--green); }
  .alert .title { font-weight: 500; margin-bottom: 4px; }
  .alert .meta { font-size: 11px; color: var(--text-muted); }
  .alert .savings { color: var(--green); font-weight: 500; }

  /* Chat */
  .chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .message { max-width: 800px; }
  .message.user { align-self: flex-end; }
  .message.user .bubble { background: var(--accent); color: #000; padding: 12px 16px; border-radius: 12px 12px 4px 12px; }
  .message.assistant { align-self: flex-start; }
  .message.assistant .bubble { background: var(--surface); border: 1px solid var(--border); padding: 12px 16px; border-radius: 12px 12px 12px 4px; }
  .message .citations { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
  .message .citation { padding: 4px 0; }
  .message .confidence { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .thinking { color: var(--purple); font-style: italic; }

  /* Input */
  .input-bar { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 12px; }
  .input-bar input { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
  .input-bar input:focus { border-color: var(--accent); }
  .input-bar button { padding: 12px 24px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
  .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Loading */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); gap: 12px; }
  .empty .icon { font-size: 48px; opacity: 0.3; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span>🧠</span> Second Brain</h1>
  </header>

  <aside>
    <div class="sources" id="sources">
      <div class="source"><span class="dot off"></span> Loading...</div>
    </div>

    <div class="actions">
      <button class="btn" onclick="syncSources()">
        <span class="label">🔄 Sync Data</span>
        <span class="hint">Refresh from all sources</span>
      </button>
      <button class="btn" onclick="scanAlerts()">
        <span class="label">🔍 Find Savings</span>
        <span class="hint">Scan for waste & duplicates</span>
      </button>
    </div>

    <div class="alerts-header">Savings Alerts</div>
    <div id="alerts">
      <div class="alert low"><div class="title">No alerts yet</div><div class="meta">Run a scan to find savings</div></div>
    </div>
  </aside>

  <main class="chat">
    <div class="messages" id="messages">
      <div class="empty">
        <div class="icon">🧠</div>
        <div>Ask anything about your organization</div>
        <div style="font-size: 13px">Try: "What are we working on?" or "Why did we build feature X?"</div>
      </div>
    </div>
    <div class="input-bar">
      <input type="text" id="question" placeholder="Ask a question..." autofocus
             onkeydown="if(event.key==='Enter')askQuestion()">
      <button onclick="askQuestion()" id="askBtn">Ask</button>
    </div>
  </main>
</div>

<script>
const API = '';

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  return res.json();
}

async function loadStatus() {
  const { status } = await api('/status');
  const el = document.getElementById('sources');
  el.innerHTML = status.map(s => `
    <div class="source">
      <span class="dot ${s.configured ? 'on' : 'off'}"></span>
      <span>${s.source}</span>
      ${s.docCount ? `<span class="count">${s.docCount} docs</span>` : ''}
    </div>
  `).join('');
}

async function syncSources() {
  const btn = event.target.closest('.btn');
  btn.disabled = true;
  btn.querySelector('.label').innerHTML = '<span class="spinner"></span> Syncing...';
  try {
    await api('/sync', { method: 'POST', body: '{}' });
    await loadStatus();
  } catch (e) {
    alert('Sync failed: ' + e.message);
  }
  btn.disabled = false;
  btn.querySelector('.label').textContent = '🔄 Sync Data';
}

async function scanAlerts() {
  const btn = event.target.closest('.btn');
  btn.disabled = true;
  btn.querySelector('.label').innerHTML = '<span class="spinner"></span> Scanning...';
  try {
    const { report } = await api('/alerts');
    renderAlerts(report);
  } catch (e) {
    alert('Scan failed: ' + e.message);
  }
  btn.disabled = false;
  btn.querySelector('.label').textContent = '🔍 Find Savings';
}

function renderAlerts(report) {
  const el = document.getElementById('alerts');
  if (!report || report.includes('No significant') || report.includes('No data')) {
    el.innerHTML = '<div class="alert low"><div class="title">All clear!</div><div class="meta">No savings opportunities found</div></div>';
    return;
  }
  // Simple parse of the report text into alert cards
  const lines = report.split('\n').filter(l => l.trim());
  const alerts = [];
  for (const line of lines) {
    if (line.includes('[DUPLICATE]') || line.includes('[STALLED]') || line.includes('[WASTE]')) {
      const type = line.includes('[DUPLICATE]') ? 'duplicate' : line.includes('[STALLED]') ? 'stalled' : 'waste';
      const severity = line.includes('🔴') ? 'high' : line.includes('🟡') ? 'medium' : 'low';
      const title = line.replace(/^[🔴🟡🟢]\s*\d+\.\s*\[[\w]+\]\s*/, '');
      alerts.push({ type, severity, title });
    }
  }
  if (alerts.length === 0) {
    el.innerHTML = `<div class="alert low"><div class="title">Scan complete</div><div class="meta">${report.slice(0, 200)}</div></div>`;
    return;
  }
  el.innerHTML = alerts.map(a => `
    <div class="alert ${a.severity}">
      <div class="title">${a.title}</div>
      <div class="meta">${a.type} · ${a.severity}</div>
    </div>
  `).join('');
}

async function askQuestion() {
  const input = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;

  const messages = document.getElementById('messages');
  const empty = messages.querySelector('.empty');
  if (empty) empty.remove();

  // Add user message
  messages.innerHTML += `<div class="message user"><div class="bubble">${escapeHtml(question)}</div></div>`;

  // Add thinking placeholder
  const thinkingId = 'thinking-' + Date.now();
  messages.innerHTML += `<div class="message assistant" id="${thinkingId}"><div class="bubble thinking"><span class="spinner"></span> Thinking...</div></div>`;

  input.value = '';
  const btn = document.getElementById('askBtn');
  btn.disabled = true;

  messages.scrollTop = messages.scrollHeight;

  try {
    const result = await api('/ask', {
      method: 'POST',
      body: JSON.stringify({ question }),
    });

    // Remove thinking
    document.getElementById(thinkingId)?.remove();

    // Add answer
    let html = `<div class="message assistant"><div class="bubble">${escapeHtml(result.answer)}</div>`;
    if (result.citations?.length > 0) {
      html += `<div class="citations">📚 Sources:<br>`;
      html += result.citations.map(c =>
        `<div class="citation">[${c.type}] ${c.source}${c.url ? ` <a href="${c.url}" target="_blank">↗</a>` : ''}</div>`
      ).join('');
      html += `</div>`;
    }
    html += `<div class="confidence">Confidence: ${Math.round((result.confidence || 0) * 100)}%</div>`;
    html += `</div>`;
    messages.innerHTML += html;
  } catch (e) {
    document.getElementById(thinkingId)?.remove();
    messages.innerHTML += `<div class="message assistant"><div class="bubble" style="color: var(--red)">Error: ${escapeHtml(e.message)}</div></div>`;
  }

  btn.disabled = false;
  messages.scrollTop = messages.scrollHeight;
  input.focus();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Init
loadStatus();
</script>
</body>
</html>
